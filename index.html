<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rencana Harian + Tracker Kebiasaan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">📋 Rencana Harian</h1>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Tracker Dashboard -->
    <section class="dashboard" id="dashboard">
      <div class="progress-ring-container">
        <svg class="progress-ring" viewBox="0 0 120 120">
          <circle class="progress-ring-bg" cx="60" cy="60" r="52"/>
          <circle class="progress-ring-fill" id="progressRing" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
        </svg>
        <div class="progress-text">
          <span id="progressPercentage">0%</span>
          <small>Selesai</small>
        </div>
      </div>
      <div class="dashboard-stats">
        <div class="stat-card">
          <span class="stat-value" id="totalTasks">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="completedTasks">0</span>
          <span class="stat-label">Selesai</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="pendingTasks">0</span>
          <span class="stat-label">Tertunda</span>
        </div>
      </div>
    </section>

    <!-- Input Rencana -->
    <section class="task-input-section">
      <form id="taskForm" class="task-form">
        <div class="input-row">
          <input type="text" id="taskInput" placeholder="Tambah tugas hari ini..." required autocomplete="off" />
          <select id="prioritySelect" aria-label="Prioritas">
            <option value="tinggi">🛑 Tinggi</option>
            <option value="sedang" selected>🟡 Sedang</option>
            <option value="rendah">🟢 Rendah</option>
          </select>
          <button type="submit" class="btn-add" aria-label="Tambah tugas">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </form>
    </section>

    <!-- Filter & Daftar Tugas -->
    <section class="task-list-section">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="tinggi">🛑 Tinggi</button>
        <button class="filter-btn" data-filter="sedang">🟡 Sedang</button>
        <button class="filter-btn" data-filter="rendah">🟢 Rendah</button>
        <button class="filter-btn" data-filter="completed">✓ Selesai</button>
        <button class="filter-btn" data-filter="pending">○ Tertunda</button>
      </div>
      <ul id="taskList" class="task-list"></ul>
      <div class="task-list-footer" id="listFooter">
        <span id="taskCount">0 tugas</span>
        <button id="clearCompletedBtn" class="btn-clear">Hapus selesai</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
